<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <meta name="google-adsense-account" content="ca-pub-2122051581422074">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2122051581422074"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙 Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div id="lotto-balls-container"></div>
        <button id="generate-btn">Generate Numbers</button>

        <div class="contact-section">
            <h3>Partnership Inquiries</h3>
            <div data-fs-success style="display:none; color: #4caf50; background: rgba(76, 175, 80, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold;">
                Thanks! Your message has been sent successfully.
            </div>
            <div data-fs-error style="display:none; color: #f44336; background: rgba(244, 67, 54, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold;">
                Oops! There was a problem submitting your form.
            </div>

            <form id="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required data-fs-field>
                    <span data-fs-error="email" style="color: #f44336; font-size: 0.8rem; margin-top: 4px; display: block;"></span>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required data-fs-field></textarea>
                    <span data-fs-error="message" style="color: #f44336; font-size: 0.8rem; margin-top: 4px; display: block;"></span>
                </div>
                <button type="submit" id="submit-btn" data-fs-submit-btn>Send Inquiry</button>
            </form>
        <div class="comments-section" style="margin-top: 50px; padding-top: 30px; border-top: 2px solid var(--shadow);">
            <h3>Comments</h3>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://man-bo.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
    <script>
      window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
      formspree('initForm', { formElement: '#contact-form', formId: 'xzdyvbbo' });
    </script>
    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
