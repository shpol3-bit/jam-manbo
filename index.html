<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만세력 & 사주분석</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>만세력 & 사주분석</h1>
        
        <!-- Person 1 Input -->
        <div class="person-input-container" id="person1-container">
            <h3>나의 정보</h3>
            <div class="input-container">
                <div class="input-group">
                    <label for="year1">생년</label>
                    <input type="number" id="year1" placeholder="YYYY">
                </div>
                <div class="input-group">
                    <label for="month1">월</label>
                    <input type="number" id="month1" placeholder="MM">
                </div>
                <div class="input-group">
                    <label for="day1">일</label>
                    <input type="number" id="day1" placeholder="DD">
                </div>
                <div class="input-group">
                    <label for="hour1">시</label>
                    <select id="hour1">
                        <!-- Options will be populated by JS -->
                    </select>
                </div>
                <div class="input-group">
                    <label for="gender1">성별</label>
                    <select id="gender1">
                        <option value="male">남자</option>
                        <option value="female">여자</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Person 2 Input (for Gunghap) -->
        <div class="person-input-container" id="person2-container" style="display: none;">
            <h3>상대방 정보</h3>
            <div class="input-container">
                 <div class="input-group">
                    <label for="year2">생년</label>
                    <input type="number" id="year2" placeholder="YYYY">
                </div>
                <div class="input-group">
                    <label for="month2">월</label>
                    <input type="number" id="month2" placeholder="MM">
                </div>
                <div class="input-group">
                    <label for="day2">일</label>
                    <input type="number" id="day2" placeholder="DD">
                </div>
                <div class="input-group">
                    <label for="hour2">시</label>
                    <select id="hour2">
                         <!-- Options will be populated by JS -->
                    </select>
                </div>
                 <div class="input-group">
                    <label for="gender2">성별</label>
                    <select id="gender2">
                        <option value="male">남자</option>
                        <option value="female">여자</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="button-container">
            <button id="calculate-btn">결과 보기</button>
            <button id="gunghap-toggle-btn">궁합 보기</button>
        </div>
        
        <!-- Result Tabs -->
        <div id="result-container" style="display: none;">
            <div class="tab-nav">
                <button class="tab-link active" data-tab="basic">기본 분석</button>
                <button class="tab-link" data-tab="daewoon">대운/세운</button>
                <button class="tab-link" data-tab="sinsal">신살</button>
                <button class="tab-link" data-tab="gunghap" style="display:none;">궁합 분석</button>
            </div>
            <div id="basic" class="tab-content active"></div>
            <div id="daewoon" class="tab-content"></div>
            <div id="sinsal" class="tab-content"></div>
            <div id="gunghap" class="tab-content"></div>
        </div>
        
    </div>
    <script src="main.js"></script>
</body>
</html>
